version: "3.9"

services:
  backend:
    image: planetarium-backend
    container_name: planetarium-backend
    ports:
      - "3310:3310"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3310/api/search?q=paris"]
      interval: 30s
      timeout: 5s
      retries: 3
  frontend:
    image: planetarium-frontend
    container_name: planetarium-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped