version: "3.9"

services:
  backend:
    image: planetarium-backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "3310:3310"
    environment:
      - NODE_ENV=production

  frontend:
    image: planetarium-frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend