name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Build images
      - name: Build frontend image
        run: docker build -t planetarium-frontend -f frontend/Dockerfile.prod ./frontend

      - name: Build backend image
        run: docker build -t planetarium-backend -f backend/Dockerfile.prod ./backend

      # Save images
      - name: Save images
        run: |
          docker save planetarium-frontend -o frontend.tar
          docker save planetarium-backend -o backend.tar

      # Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Copy images
      - name: Copy images to VPS
        run: |
          scp -P ${{ secrets.VPS_PORT }} frontend.tar backend.tar \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/

      # docker-compose.prod.yml
      - name: Copy docker-compose file
        run: |
          scp -P ${{ secrets.VPS_PORT }} docker-compose.prod.yml \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/  
              
      # Deploy
      - name: Deploy
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -e

          docker load -i frontend.tar
          docker load -i backend.tar

          docker-compose -f docker-compose.prod.yml up -d --force-recreate

          rm frontend.tar backend.tar
          docker image prune -f
          EOF

      - name: Verify deployment
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            curl -f http://localhost:8080
            echo "check passed"
          EOF