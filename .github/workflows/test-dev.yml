name: Test on dev

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install all dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - name: Build
        run: npm run build