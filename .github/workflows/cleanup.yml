name: Cleanup Old Workflow Runs

on:
  workflow_dispatch:
    inputs:
      keep:
        description: 'Number of workflow runs to keep'
        required: false
        default: '15'
        type: number

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Purge old workflow runs
        uses: boredland/action-purge-workflow-runs@v1
        with:
          keep: ${{ github.event.inputs.keep || 15 }}
          token: ${{ secrets.GITHUB_TOKEN }}
